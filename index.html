<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание картинок для контекстной рекламы</title>
    
    <!-- Подключаем внешний файл стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Создание картинок для контекстной рекламы</h1>

    <!-- Форма для сбора данных -->
    <form id="image-form">
        <label for="format">Выбери формат:</label>
        <select id="format" name="format" required>
            <option value="9:16">9:16</option>
            <option value="4:3">4:3</option>
            <option value="16:9">16:9</option>
        </select>

        <label for="wishes">Напиши что хочешь видеть:</label>
        <textarea id="wishes" name="wishes" rows="4" cols="50" required></textarea>

        <label for="style">Стиль картинки:</label>
        <select id="style" name="style" required>
            <option value="minimalistic">Минималистичный</option>
            <option value="bright">Яркий</option>
            <option value="vintage">Винтаж</option>
            <option value="cartoon">Мультяшный</option>
        </select>

        <label for="text_on_image">Надпись на картинке и где она должна быть:</label>
        <textarea id="text_on_image" name="text_on_image" rows="4" cols="50" required></textarea>

        <button type="submit">Отправить</button>
    </form>

    <script>
        // Обработка отправки формы
        document.getElementById('image-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Отменяем стандартное поведение формы

            // Собираем данные из формы
            const formData = new FormData(this);

            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            fetch('https://your-n8n-instance-url/webhook/receive-form-data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(result => {
                console.log('Успех:', result);
                alert('Форма успешно отправлена!');
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Что-то пошло не так. Попробуйте снова.');
            });
        });
    </script>

</body>
</html>
